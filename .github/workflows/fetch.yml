name: Daily NYSE Breadth Fetch

on:
  schedule:
    # 美股收盘后 30 分钟 (16:30 ET = 21:30 UTC, 夏令时 20:30 UTC)
    - cron: '30 20 * * 1-5'
  workflow_dispatch:  # 手动触发

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Fetch NYSE breadth data
        run: python fetch_breadth.py
      
      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nyse_breadth.json STATUS.md
          if git diff --staged --quiet; then
            echo "No changes, skipping commit"
          else
            git commit -m "📊 Update NYSE breadth $(date +%Y-%m-%d)"
            git push
          fi
